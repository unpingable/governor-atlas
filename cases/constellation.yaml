case_id: constellation
title: "The constellation seams"
status: active
headline: "What Agent Governor asks of its siblings — and how little of it is wired."
dek: >
  Agent Governor names adapters for standing, the linear accountant, wicket, and night
  shift. Every one of those files exists. None of the cross-repo integrations is
  witnessed in running code on main — they self-describe as SPEC-honoring harness stubs.
  A second wave of asks (clock witnesses for standing/NQ, projection receipts for
  continuity) is doctrine filed in the siblings' own repos — specified or candidate,
  never wired.
why: >
  Turn off every layer but `wired` and this graph nearly empties. That emptiness is the
  finding, exactly as the intake atlas's empty external_consumer region is. The seams are
  named (honest), the integrations are not built (also honest). `spec_is_not_wired` keeps
  the existence of a stub file from masquerading as a working seam.

nodes:
  - id: mod-ag
    type: module
    label: "Agent Governor (this repo)"
    short_label: "Agent Governor"
    lane: logic
  - id: repo-standing
    type: repo
    label: "standing — workload identity / standing receipts"
    short_label: "standing"
  - id: repo-la
    type: repo
    label: "linearaccountant — capacity custody (never minted by AG)"
    short_label: "linear accountant"
  - id: repo-wicket
    type: repo
    label: "wicket — admissibility preflight kernel"
    short_label: "wicket"
  - id: repo-nightshift
    type: repo
    label: "scheduler / Night Shift — first natural dogfood"
    short_label: "Night Shift"
  - id: repo-nq
    type: repo
    label: "nq — diagnostic monitor / workload-phase witness grammar"
    short_label: "NQ"
  - id: repo-continuity
    type: repo
    label: "continuity — governed cross-session memory (the medium, not a witness)"
    short_label: "continuity"

edges:
  - id: c-standing
    type: requests
    from: mod-ag
    to: repo-standing
    claim: specified
    receipts: [r-standing-stub, r-zoning]
  - id: c-la
    type: requests
    from: mod-ag
    to: repo-la
    claim: specified
    receipts: [r-la-stub, r-zoning]
  - id: c-wicket
    type: requests
    from: mod-ag
    to: repo-wicket
    claim: specified
    receipts: [r-wicket-stub]
  - id: c-nightshift
    type: requests
    from: mod-ag
    to: repo-nightshift
    claim: specified
    receipts: [r-nightshift-adapter]
  # NQ owns the workload-phase witness grammar; AG's mapping is a reserved name blocked
  # on NQ's ratification. Named, not built — candidate, excluded from the default view.
  - id: c-nq-phase
    type: requests
    from: mod-ag
    to: repo-nq
    claim: candidate
    receipts: [r-zoning]
  # Clock-witness invariant (2026-06-18): governed time comparisons run on declared clock
  # witnesses, not bare timestamps. AG's seed is wired (clock_witness.py); the cross-repo
  # asks are named in the siblings' own candidate docs — specified, not witnessed there.
  - id: c-cw-standing
    type: requests
    from: mod-ag
    to: repo-standing
    claim: specified
    receipts: [r-cw-standing, r-cw-invariant]
  - id: c-cw-nq
    type: requests
    from: mod-ag
    to: repo-nq
    claim: specified
    receipts: [r-cw-nq, r-cw-invariant]
  # Projection receipts (2026-06-18): AG asks continuity to witness semantic reads
  # (stored-is-not-true). A reserved name with no live forcing case — candidate. This
  # spends the case's second and last candidate slot (with c-nq-phase).
  - id: c-proj-continuity
    type: requests
    from: mod-ag
    to: repo-continuity
    claim: candidate
    receipts: [r-proj-continuity]
